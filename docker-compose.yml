services:
  openviking:
    image: ghcr.io/volcengine/openviking:v0.3.13
    container_name: pi-openviking
    command: ["openviking-server", "--host", "0.0.0.0"]
    environment:
      - OPENVIKING_CONFIG_FILE=/app/.openviking/ov.conf
    volumes:
      - ${HOME}/.openviking/ov.conf:/app/.openviking/ov.conf
      - ${HOME}/.openviking/data:/app/data
    network_mode: host
    restart: unless-stopped
