{
  "server": {
    "host": "0.0.0.0",
    "port": 1933,
    "auth_mode": "api_key",
    "root_api_key": "dev"
  },
  "log": {
    "level": "INFO",
    "format": "%(asctime)s - %(name)s - %(levelname)s - %(message)s",
    "output": "stdout"
  },
  "storage": {
    "workspace": "/app/data",
    "agfs": {
      "backend": "local"
    },
    "vectordb": {
      "backend": "local",
      "name": "context"
    }
  },
  "embedding": {
    "max_concurrent": 4,
    "max_retries": 2,
    "dense": {
      "provider": "openai",
      "model": "huggingface.co/ggml-org/bge-m3-q8_0-gguf",
      "api_key": "no-key",
      "api_base": "http://localhost:12434/v1",
      "dimension": 1024
    }
  },
  "vlm": {
    "provider": "openai",
    "api_key": "no-key",
    "api_base": "http://localhost:12434/v1",
    "model": "ai/gemma4:E2B",
    "max_concurrent": 2,
    "max_retries": 2,
    "timeout": 600
  },
  "semantic": {
    "max_file_content_chars": 32768
  }
}
