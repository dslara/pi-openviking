services:
  openviking-test:
    image: ghcr.io/volcengine/openviking:v0.3.14
    container_name: pi-openviking-test
    command: ["openviking-server", "--host", "0.0.0.0"]
    network_mode: host
    environment:
      - OPENVIKING_CONFIG_FILE=/app/.openviking/ov.conf
    volumes:
      - ./.ov-test-data/ov.conf:/app/.openviking/ov.conf
      - ./.ov-test-data/data:/app/data
      - ${HOME}/.openviking/models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
